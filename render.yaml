services:
  - type: web
    name: journal-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: journal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d

databases:
  - name: journal-db
    databaseName: journal_db
    user: journal_user
    plan: free
